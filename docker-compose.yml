name: ksp-crime-intelligence

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ksp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ksp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ksp_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ksp_crime}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Executed in filename order on FIRST boot only. `make reset` wipes the
      # volume so these re-run.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ksp} -d ${POSTGRES_DB:-ksp_crime}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: ksp_backend
    command: python serve.py --reload
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ksp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ksp_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ksp_crime}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      # LLM provider — "uniai" (Zoho Catalyst UniAI gateway, demo default) or "anthropic"
      LLM_PROVIDER: ${LLM_PROVIDER:-uniai}
      UNIAI_BASE_URL: ${UNIAI_BASE_URL:-}
      UNIAI_API_KEY: ${UNIAI_API_KEY:-}
      UNIAI_MODEL: ${UNIAI_MODEL:-}
      UNIAI_CHAT_PATH: ${UNIAI_CHAT_PATH:-/v1/chat/completions}
      UNIAI_AUTH_SCHEME: ${UNIAI_AUTH_SCHEME:-bearer}
      UNIAI_TOOL_MODE: ${UNIAI_TOOL_MODE:-prompted}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ORCHESTRATION_MODEL: ${ORCHESTRATION_MODEL:-claude-opus-4-8}
      BULK_MODEL: ${BULK_MODEL:-claude-sonnet-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      # Keep the image's venv — the bind mount above would otherwise shadow it.
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ksp_frontend
    environment:
      NODE_ENV: development
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      # Keep the image's node_modules — same shadowing problem as above.
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
